                     /etc/keepalived/keepalived.conf

#La configuration pour le Proxy Leader
                    
vrrp_script check_haproxy {
    script "killall -0 haproxy"
    interval 2
    weight 2
}

vrrp_instance VI_1 {
    state MASTER
    interface eth0
    virtual_router_id 51
    priority 101
    advert_int 1

    authentication {
        auth_type PASS
        auth_pass SecuriteEcoLab
    }

    virtual_ipaddress {
        10.10.1.100/24
    }

    track_script {
        check_haproxy
    }
}



#La configuration pour le Proxy Backup

vrrp_script check_haproxy {
    script "killall -0 haproxy"
    interval 2
    weight 2
}

vrrp_instance VI_1 {
    state BACKUP
    interface eth0
    virtual_router_id 51
    priority 100
    advert_int 1

    authentication {
        auth_type PASS
        auth_pass SecuriteEcoLab
    }

    virtual_ipaddress {
        10.10.1.100/24
    }

    track_script {
        check_haproxy
    }
}